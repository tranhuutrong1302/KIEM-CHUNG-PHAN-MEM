<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn của tôi - Royal Bid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .product-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); }
        .product-info { display: flex; align-items: center; gap: 14px; }
        .product-name { font-weight: 700; color: #ffffff; }
        .product-meta { font-size: 0.85rem; color: #adb5bd; }
        .custom-table tbody td { vertical-align: middle; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">ROYAL BID</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <button class="btn btn-outline-light btn-sm" onclick="goHome()"><i class="fa-solid fa-house"></i> Trang chủ</button>
                <button class="btn btn-sm btn-secondary" onclick="logout()">Thoát</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="page-header text-center mb-5">
            <h2 class="page-title">Lịch sử đấu giá của bạn</h2>
        </div>
        <div id="bidContent"></div>
    </div>

    <script>
        const API_BASE = '/backend/api';

        function goHome() { window.location.href = 'index.html'; }

        async function apiFetch(path, options = {}) {
            options.credentials = 'include';
            options.headers = options.headers || {};
            if (options.body && typeof options.body === 'object') {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(options.body);
            }
            const response = await fetch(`${API_BASE}/${path}`, options);
            return { status: response.status, data: await response.json() };
        }

        function normalizeImageUrl(path) {
            if (!path) return '';
            if (path.startsWith('http')) return path;
            path = path.replace(/\\/g, '/');
            const trimmed = path.startsWith('/') ? path.slice(1) : path;
            return '/' + trimmed.split('/').map(segment => encodeURIComponent(segment)).join('/');
        }

        function formatMoney(value) {
            return Number(value).toLocaleString('de-DE') + ' đ';
        }

        function renderBids(items) {
            if (!items.length) {
                document.getElementById('bidContent').innerHTML = '<div class="alert alert-secondary text-center">Bạn chưa tham gia đấu giá nào.</div>';
                return;
            }
            const rows = items.map(item => {
                const now = Date.now();
                const diff = item.end_time_js - now;
                let expireText = 'Kết thúc';
                if (diff > 0) {
                    const d = Math.floor(diff / (1000*60*60*24));
                    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                    const s = Math.floor((diff % (1000*60)) / 1000);
                    expireText = `${d}d ${h}h ${m}m ${s}s`;
                }
                let status = '<span class="status-badge badge-fail">Bị vượt giá</span>';
                if (item.bid_amount >= item.current_price) {
                    if (diff <= 0) {
                        if (item.order_status === 'paid' || item.is_paid == 1) {
                            status = '<span class="status-badge badge-paid">Đã thanh toán</span>';
                        } else if (item.order_status === 'pending') {
                            status = '<span class="status-badge badge-pending">Đang xử lý</span>';
                        } else {
                            status = '<span class="status-badge badge-won">Chiến thắng</span>';
                        }
                    } else {
                        status = '<span class="status-badge badge-lead">Đang dẫn đầu</span>';
                    }
                }
                return `
                    <tr>
                        <td>${new Date(item.bid_time).toLocaleString('vi-VN')}</td>
                        <td>
                    <div class="product-info">
                        <img src="${normalizeImageUrl(item.image)}" class="product-thumb" alt="thumb">
                        <div>
                            <div class="product-name">${item.name}</div>
                            <div class="product-meta">Mã SP: ${item.product_id || ''}</div>
                        </div>
                    </div>
                </td>
                        <td class="text-warning fw-bold">${formatMoney(item.bid_amount)}</td>
                        <td class="text-danger fw-bold">${formatMoney(item.current_price)}</td>
                        <td>${expireText}</td>
                        <td>${status}</td>
                    </tr>`;
            }).join('');
            document.getElementById('bidContent').innerHTML = `
                <div class="glass-container">
                    <div class="table-responsive">
                        <table class="custom-table">
                            <thead>
                                <tr>
                                    <th>Ngày đặt</th>
                                    <th>Sản phẩm</th>
                                    <th>Giá bạn đặt</th>
                                    <th>Giá hiện tại</th>
                                    <th>Kết thúc</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        async function loadBids() {
            const result = await apiFetch('my_bids.php');
            if (result.status === 200 && result.data.success) {
                renderBids(result.data.data);
            } else if (result.status === 401) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('bidContent').innerHTML = '<div class="alert alert-danger">Không tải được dữ liệu. Vui lòng thử lại.</div>';
            }
        }

        async function logout() {
            await apiFetch('logout.php', { method: 'POST' });
            window.location.href = 'login.html';
        }

        loadBids();
    </script>
</body>
</html>
