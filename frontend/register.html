<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Royal Bid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header text-center">
                <i class="fa-solid fa-user-plus icon-header"></i>
                <h2>ĐĂNG KÝ</h2>
                <p class="text-secondary small">Trở thành thành viên của Royal Bid</p>
            </div>

            <div id="message" class="alert d-none" role="alert"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Chọn tên đăng nhập..." required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email liên hệ</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Họ và tên</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                        <input type="text" name="full_name" id="full_name" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-auth">Tạo Tài Khoản</button>
            </form>

            <div class="link-register text-center mt-4">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full_name').value.trim();
            const message = document.getElementById('message');
            message.classList.add('d-none');

            const response = await fetch('/backend/api/register.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, full_name: fullName })
            });
            const data = await response.json();
            if (data.success) {
                window.location.href = 'login.html';
            } else {
                message.textContent = data.message || 'Đăng ký thất bại';
                message.classList.remove('d-none');
                message.classList.add('alert-danger');
            }
        });
    </script>
</body>
</html>
